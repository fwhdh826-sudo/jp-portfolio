name: Update Market Data

on:
  schedule:
    # 毎平日 8:30 JST (= 23:30 UTC 前日)
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install yfinance pandas numpy feedparser

      # ── v8.3 既存 ─────────────────────────────────
      - name: Update correlation.json
        run: python3 data/update_correlation.py || true

      - name: Update market.json
        run: python3 data/update_market.py || true

      # ── v9.0 新規 ─────────────────────────────────
      - name: Update macro.json (金利/為替/VIX/指数/原油/金)
        run: python3 data/update_macro.py || true

      - name: Update sq_calendar.json (SQ日程)
        run: python3 data/update_sq.py || true

      - name: Update margin / flows
        run: python3 data/update_flows.py || true

      - name: Update earnings calendar
        run: python3 data/update_earnings.py || true

      - name: Collect news (複数RSS + 保有銘柄フィルタ)
        run: python3 data/update_news.py || true

      - name: Copy JSON to public/data
        run: |
          for f in correlation market macro sq_calendar margin flows earnings_calendar news; do
            if [ -f "data/${f}.json" ]; then
              cp "data/${f}.json" "public/data/${f}.json"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: auto-update data $(date +'%Y-%m-%d')"
          git push
