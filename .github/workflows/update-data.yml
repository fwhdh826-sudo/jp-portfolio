name: Update Market Data

on:
  schedule:
    # 毎平日 8:30 JST (= 23:30 UTC 前日)
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install yfinance pandas numpy feedparser

      - name: Update correlation.json
        run: python3 data/update_correlation.py

      - name: Update market.json
        run: python3 data/update_market.py

      - name: Collect news
        run: python3 data/update_news.py || true   # ニュース失敗はスキップ

      - name: Copy JSON to public/data
        run: |
          cp data/correlation.json public/data/correlation.json
          cp data/market.json      public/data/market.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: auto-update data $(date +'%Y-%m-%d')"
          git push
